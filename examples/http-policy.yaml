# examples/http-policy.yaml
#
# HTTP transport example for a localhost/sidecar MCP server that accepts JSON-RPC
# over POST and shares the same filesystem namespace/path roots as mcpgate.
# For truly remote MCP servers, resolve_within validates the gateway host's
# filesystem, not the remote server's filesystem.
#
# Usage:
#   export MCPGATE_TOKEN=$(openssl rand -hex 32)
#   mcpgate --config examples/http-policy.yaml

version: 1
mode: enforce
default: "false"

servers:
  sidecar-filesystem:
    url: "http://127.0.0.1:9000/mcp"
    egress_allow: ["127.0.0.1"]

    tools:
      read_file:
        allow: "true"
        constraints:
          path:
            # within is a string-level containment check.
            within: ["/srv/safe"]
            # resolve_within uses mcpgate's local EvalSymlinks; it is only
            # meaningful when the MCP server sees the same filesystem namespace.
            resolve_within: ["/srv/safe"]

      write_file:
        # Constraints are evaluated for allow rules, not ask prompts; the
        # approver must inspect the proposed path and mode before allowing.
        allow: ask

      delete_file:
        allow: "false"

    resources:
      allow: "false"

    prompts:
      allow: false

    sampling:
      allow: false

heuristics:
  enabled: true
  block_on_warn: true
