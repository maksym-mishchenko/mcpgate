<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mcpgate</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --blue: #58a6ff;
    --font: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; }
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  header h1 { font-size: 16px; color: var(--blue); }
  #status-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--red);
    transition: background 0.3s;
  }
  #status-dot.connected { background: var(--green); }
  #status-label { color: var(--muted); font-size: 11px; }
  main { display: grid; grid-template-rows: auto 1fr; height: calc(100vh - 49px); }
  section { padding: 16px 20px; }
  section h2 { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
  #pending-section { border-bottom: 1px solid var(--border); overflow-y: auto; max-height: 45vh; }
  #pending-cards { display: flex; flex-direction: column; gap: 10px; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    padding: 12px 14px; display: flex; flex-direction: column; gap: 8px;
  }
  .card-header { display: flex; align-items: baseline; gap: 10px; }
  .card-method { color: var(--yellow); font-weight: bold; }
  .card-name { color: var(--blue); }
  .card-server { color: var(--muted); font-size: 11px; }
  .card-args { color: var(--muted); word-break: break-all; font-size: 11px; background: var(--bg); padding: 6px 8px; border-radius: 4px; }
  .card-actions { display: flex; gap: 8px; }
  .btn {
    border: none; border-radius: 4px; padding: 5px 14px; font-family: var(--font);
    font-size: 12px; cursor: pointer; font-weight: bold; transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.8; }
  .btn-allow { background: var(--green); color: #000; }
  .btn-deny  { background: var(--red);   color: #fff; }
  #no-pending { color: var(--muted); font-size: 12px; }
  #audit-section { overflow: hidden; display: flex; flex-direction: column; }
  #audit-filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  #audit-filters label { color: var(--muted); font-size: 11px; display: flex; align-items: center; gap: 5px; }
  #audit-filters input, #audit-filters select {
    background: var(--surface); color: var(--text); border: 1px solid var(--border);
    border-radius: 4px; padding: 4px 6px; font-family: var(--font); font-size: 11px;
  }
  #audit-table-wrap { overflow-y: auto; flex: 1; }
  table { width: 100%; border-collapse: collapse; }
  th { color: var(--muted); text-align: left; padding: 4px 8px; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); }
  td { padding: 4px 8px; border-bottom: 1px solid #21262d; color: var(--text); white-space: nowrap; }
  tr.allow td:first-child { border-left: 2px solid var(--green); }
  tr.deny  td:first-child { border-left: 2px solid var(--red); }
  tr.ask   td:first-child { border-left: 2px solid var(--yellow); }
  .verdict-allow { color: var(--green); }
  .verdict-deny  { color: var(--red); }
  .verdict-ask   { color: var(--yellow); }
  .warn-badge { color: var(--yellow); font-weight: 600; margin-right: 6px; cursor: help; }
  .warning-details { display: inline-block; color: var(--yellow); }
  .warning-details summary { cursor: pointer; list-style: none; }
  .warning-list { margin-top: 4px; color: var(--text); white-space: normal; max-width: 520px; }
  .warning-list li { margin: 2px 0; }
</style>
</head>
<body>
<header>
  <div id="status-dot"></div>
  <h1>mcpgate</h1>
  <span id="status-label">connecting…</span>
</header>
<main>
  <section id="pending-section">
    <h2>Pending Approvals</h2>
    <div id="pending-cards"><span id="no-pending">No pending calls.</span></div>
  </section>
  <section id="audit-section">
    <h2>Live Audit Feed</h2>
    <div id="audit-filters">
      <label>Verdict
        <select id="filter-verdict" onchange="renderAuditRows()">
          <option value="">Any</option>
          <option value="ALLOW">Allow</option>
          <option value="DENY">Deny</option>
          <option value="ASK">Ask</option>
        </select>
      </label>
      <label>Method <input id="filter-method" type="search" placeholder="tools/call" oninput="renderAuditRows()"></label>
      <label>Server <input id="filter-server" type="search" placeholder="filesystem" oninput="renderAuditRows()"></label>
      <label>Source
        <select id="filter-source" onchange="renderAuditRows()">
          <option value="">Any</option>
          <option value="policy">Policy</option>
          <option value="human">Human</option>
          <option value="timeout">Timeout</option>
          <option value="heuristic">Heuristic</option>
        </select>
      </label>
      <label><input id="filter-warnings" type="checkbox" onchange="renderAuditRows()"> Warnings only</label>
    </div>
    <div id="audit-table-wrap">
      <table>
        <thead><tr>
          <th>Time</th><th>Server</th><th>Method</th><th>Name</th><th>Verdict</th><th>Source</th><th>Reason</th>
        </tr></thead>
        <tbody id="audit-body"></tbody>
      </table>
    </div>
  </section>
</main>
<script>
const token = new URLSearchParams(location.search).get('token') || '';
const api = (path, opts) => fetch(path + (path.includes('?') ? '&' : '?') + 'token=' + token, opts);

// --- pending cards ---
const pendingMap = {};

function renderPending() {
  const container = document.getElementById('pending-cards');
  const keys = Object.keys(pendingMap);
  if (keys.length === 0) {
    container.innerHTML = '<span id="no-pending">No pending calls.</span>';
    return;
  }
  container.innerHTML = '';
  keys.forEach(key => {
    const c = pendingMap[key];
    const div = document.createElement('div');
    div.className = 'card';
    div.id = 'card-' + CSS.escape(key);
    const argsStr = c.args && Object.keys(c.args).length ? JSON.stringify(c.args, null, 2) : '{}';
    const header = document.createElement('div');
    header.className = 'card-header';
    header.appendChild(textSpan('card-method', c.method));
    header.appendChild(textSpan('card-name', c.name));
    header.appendChild(textSpan('card-server', c.server));

    const pre = document.createElement('pre');
    pre.className = 'card-args';
    pre.textContent = argsStr;

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const allow = document.createElement('button');
    allow.className = 'btn btn-allow';
    allow.textContent = 'Allow';
    allow.addEventListener('click', () => decide(key, 'allow'));
    const deny = document.createElement('button');
    deny.className = 'btn btn-deny';
    deny.textContent = 'Deny';
    deny.addEventListener('click', () => decide(key, 'deny'));
    actions.appendChild(allow);
    actions.appendChild(deny);

    div.appendChild(header);
    div.appendChild(pre);
    div.appendChild(actions);
    container.appendChild(div);
  });
}

function textSpan(className, value) {
  const span = document.createElement('span');
  span.className = className;
  span.textContent = value || '';
  return span;
}

async function decide(key, verdict) {
  const card = document.getElementById('card-' + CSS.escape(key));
  if (card) { card.style.opacity = '0.4'; card.querySelectorAll('button').forEach(b => b.disabled = true); }
  await api('/approve', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ key, verdict })
  });
}

// --- audit table ---
const MAX_ROWS = 200;
const auditRows = [];

function addAuditRow(e) {
  auditRows.unshift(e);
  while (auditRows.length > MAX_ROWS) auditRows.pop();
  renderAuditRows();
}

function renderAuditRows() {
  const tbody = document.getElementById('audit-body');
  tbody.innerHTML = '';
  auditRows.filter(matchesAuditFilters).forEach(e => {
    tbody.appendChild(auditRowElement(e));
  });
}

function matchesAuditFilters(e) {
  const verdictFilter = document.getElementById('filter-verdict').value;
  const methodFilter = document.getElementById('filter-method').value.toLowerCase();
  const serverFilter = document.getElementById('filter-server').value.toLowerCase();
  const sourceFilter = document.getElementById('filter-source').value.toLowerCase();
  const warningsOnly = document.getElementById('filter-warnings').checked;
  const verdict = (e.Verdict || e.verdict || '').toUpperCase();
  const method = (e.Method || e.method || '').toLowerCase();
  const server = (e.Server || e.server || '').toLowerCase();
  const source = approvalSource(e).toLowerCase();
  const warnings = e.Warnings || e.warnings || [];
  return (!verdictFilter || verdict === verdictFilter)
    && (!methodFilter || method.includes(methodFilter))
    && (!serverFilter || server.includes(serverFilter))
    && (!sourceFilter || source === sourceFilter)
    && (!warningsOnly || warnings.length > 0);
}

function auditRowElement(e) {
  const ts = new Date(e.Ts || e.ts).toLocaleTimeString();
  const verdict = (e.Verdict || e.verdict || '').toUpperCase();
  const vClass = verdict === 'ALLOW' ? 'allow' : verdict === 'DENY' ? 'deny' : 'ask';
  const tr = document.createElement('tr');
  tr.className = vClass;
  const warnings = e.Warnings || e.warnings || [];
  const warnBadge = renderWarnings(warnings);
  tr.innerHTML = `<td>${esc(ts)}</td><td>${esc(e.Server||e.server||'')}</td><td>${esc(e.Method||e.method||'')}</td><td>${esc(e.Name||e.name||'')}</td><td class="verdict-${vClass}">${warnBadge}${esc(verdict)}</td><td>${esc(approvalSource(e))}</td><td>${esc(e.Reason||e.reason||'')}</td>`;
  return tr;
}

function approvalSource(e) {
  return e.ApprovalSource || e.approval_source || '';
}

function renderWarnings(warnings) {
  if (!warnings.length) return '';
  const items = warnings.map(w => {
    const id = w.id || w.ID || 'unknown';
    const severity = w.severity || w.Severity || 'unknown';
    const snippet = w.snippet || w.Snippet || '';
    return `<li><strong>${esc(id)}</strong> <span>${esc(severity)}</span><br><code>${esc(snippet)}</code></li>`;
  }).join('');
  return `<details class="warning-details"><summary class="warn-badge">⚠ ${warnings.length}</summary><ul class="warning-list">${items}</ul></details>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// --- load initial state ---
async function loadInitial() {
  const [pRes, aRes] = await Promise.all([
    api('/pending').then(r => r.json()).catch(() => []),
    api('/audit').then(r => r.json()).catch(() => [])
  ]);
  (pRes || []).forEach(c => { pendingMap[c.key] = c; });
  renderPending();
  (aRes || []).forEach(e => auditRows.push(e));
  renderAuditRows();
}

// --- SSE ---
function connectSSE() {
  const dot = document.getElementById('status-dot');
  const label = document.getElementById('status-label');
  const es = new EventSource('/events?token=' + token);

  es.onopen = () => {
    dot.className = 'connected';
    label.textContent = 'connected';
  };
  es.onerror = () => {
    dot.className = '';
    label.textContent = 'reconnecting…';
  };

  es.addEventListener('pending', e => {
    const c = JSON.parse(e.data);
    pendingMap[c.key] = c;
    renderPending();
  });

  es.addEventListener('resolved', e => {
    const r = JSON.parse(e.data);
    delete pendingMap[r.key];
    renderPending();
  });

  es.addEventListener('audit', e => {
    addAuditRow(JSON.parse(e.data));
  });
}

loadInitial().then(connectSSE);
</script>
</body>
</html>
