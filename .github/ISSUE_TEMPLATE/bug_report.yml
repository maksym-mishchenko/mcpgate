name: Bug report
description: Report a reproducible mcpgate defect.
title: "fix: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve mcpgate. Do not include tokens, audit keys, private prompts, or production audit logs.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: mcpgate denied an allowed call after...
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include a minimal policy/config and command sequence when possible.
      placeholder: |
        1. Run `mcpgate --config ...`
        2. Send ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v1.4.3, commit SHA, or `mcpgate --version`
    validations:
      required: true
  - type: dropdown
    id: transport
    attributes:
      label: Transport
      options:
        - stdio
        - http
        - both
        - not sure
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or audit excerpt
      description: Remove secrets, tokens, local private paths, and sensitive prompt content.
      render: text
