# examples/simple-policy.yaml
#
# A minimal but realistic policy for a filesystem MCP server.
# This policy allows read_file within a safe directory, requires human
# approval for write_file, and hard-denies delete_file and anything else.
#
# Usage:
#   export MCPGATE_TOKEN=$(openssl rand -hex 32)
#   mcpgate --config examples/simple-policy.yaml

version: 1
mode: enforce    # "observe" to log-only without blocking (for discovery)
default: "false" # deny anything not explicitly listed

servers:
  # With one configured server, mcpgate selects it automatically. With multiple
  # configured servers, pass --server mcp-filesystem.
  mcp-filesystem:
    # mcpgate starts this stdio command from the policy config.
    command: ["/usr/local/bin/mcp-filesystem", "--root", "/home/user/safe"]

    tools:
      # read_file: allowed for existing paths within the safe directory.
      # resolve_within adds symlink defense and fails closed if the path/root
      # cannot be resolved.
      read_file:
        allow: "true"
        constraints:
          path:
            within: ["/home/user/safe"]
            resolve_within: ["/home/user/safe"]

      # write_file: requires human approval before executing.
      # Use within rather than resolve_within because a newly-created file may
      # not exist at policy-check time.
      write_file:
        allow: ask
        constraints:
          path:
            within: ["/home/user/safe"]

      # list_directory: allowed for existing directories under safe root.
      list_directory:
        allow: "true"
        constraints:
          path:
            within: ["/home/user/safe"]
            resolve_within: ["/home/user/safe"]
          fields:
            recursive:
              bool: false

      # delete_file: hard deny — no exceptions.
      delete_file:
        allow: "false"

      # create_directory: hard deny.
      create_directory:
        allow: "false"

      # move_file: hard deny — could be used to move files out of safe root.
      move_file:
        allow: "false"

    # Resources exposed via resources/read (e.g. file:// URIs).
    resources:
      allow: "true"

# Injection / tool-poisoning heuristics (v1.1).
# Deterministic signature scanning of MCP traffic in both directions.
heuristics:
  enabled: true          # WARN-only detection (default)
  block_on_warn: false   # set true to deny on a match and withhold poisoned content
