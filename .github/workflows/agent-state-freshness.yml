# Managed by scripts/seed-agent-memory.sh (agent-memory system).
# Canonical source: superpowers/templates/agent-memory/state-freshness-workflow.yml in the `docs` repo.
# Do not edit here — run `seed-agent-memory.sh --update` to re-sync.
#
# Advisory PR gate: warns when real work landed without updating .agent/STATE.md.
# Self-contained (no external scripts / no PAT). Uses GitHub-hosted runners so
# public pull requests cannot execute untrusted code on self-hosted machines.
# Opt in to enforcement by adding this check to branch protection.
name: agent-state-freshness

on:
  pull_request:

permissions:
  contents: read

jobs:
  state-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check .agent/STATE.md freshness
        shell: bash
        run: |
          set -uo pipefail
          STATE=".agent/STATE.md"
          if [ ! -f "$STATE" ]; then
            echo "skip: no $STATE (repo not seeded)"; exit 0
          fi
          upd_date="$(grep -m1 '^Last updated:' "$STATE" \
            | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -1 || true)"
          if [ -z "$upd_date" ]; then
            echo "::error file=$STATE::No parseable 'Last updated: YYYY-MM-DD' line"; exit 1
          fi
          last_work="$(git log -1 --format=%cs -- . ':(exclude).agent' 2>/dev/null || echo "")"
          if [ -z "$last_work" ]; then
            echo "ok: no non-.agent commits to compare against (STATE updated $upd_date)"; exit 0
          fi
          if [ "$last_work" \> "$upd_date" ]; then
            echo "::error file=$STATE::STALE — latest work commit ($last_work) is newer than STATE 'Last updated' ($upd_date). Update .agent/STATE.md."
            exit 1
          fi
          echo "ok: STATE updated $upd_date, latest work commit $last_work"
