# examples/http-policy.yaml
#
# HTTP transport example for a remote or sidecar MCP server that accepts JSON-RPC
# over POST. Egress is restricted to the configured hostname.
#
# Usage:
#   export MCPGATE_TOKEN=$(openssl rand -hex 32)
#   mcpgate --config examples/http-policy.yaml

version: 1
mode: enforce
default: "false"

servers:
  remote-filesystem:
    url: "http://127.0.0.1:9000/mcp"
    egress_allow: ["127.0.0.1"]

    tools:
      read_file:
        allow: "true"
        constraints:
          path:
            # within is a string-level containment check.
            within: ["/srv/safe"]
            # resolve_within adds symlink defense for existing paths.
            resolve_within: ["/srv/safe"]

      write_file:
        allow: ask
        constraints:
          path:
            # Use within for writes because a new target may not exist yet.
            within: ["/srv/safe"]
          fields:
            mode:
              one_of: ["create", "overwrite"]

      delete_file:
        allow: "false"

    resources:
      allow: "false"

    prompts:
      allow: false

    sampling:
      allow: false

heuristics:
  enabled: true
  block_on_warn: true
