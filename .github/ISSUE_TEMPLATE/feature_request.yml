name: Feature request
description: Suggest a scoped improvement to mcpgate.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful behavior change.
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security and trust considerations
      description: How does this affect policy enforcement, audit integrity, auth, or MCP trust boundaries?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
